<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>移动端个人理财 · MindDeck</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0e1013;
    --bg-1: #14181d;
    --bg-2: #1b2027;
    --bg-3: #242a33;
    --line: #2a313c;
    --line-2: #353d4a;
    --fg: #e6e9ee;
    --fg-dim: #9aa3af;
    --fg-mute: #6a7380;
    --accent: oklch(0.72 0.13 245);
    --accent-dim: oklch(0.55 0.10 245);
    --warn: oklch(0.78 0.14 70);
    --hotspot: oklch(0.72 0.13 245 / 0.5);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.5 "SF Pro Text", -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== 三栏布局（中间两条 splitter 是 5px 的网格轨道，可拖拽改 col 宽度） ===== */
  .app {
    display: grid;
    grid-template-columns:
      var(--col-left, 280px)
      5px
      minmax(0, 1fr)
      5px
      var(--col-right, 320px);
    height: 100vh;
    width: 100vw;
  }
  @media (max-width: 1200px) {
    .app {
      grid-template-columns:
        var(--col-left, 240px)
        5px
        minmax(0, 1fr)
        5px
        var(--col-right, 280px);
    }
  }
  .splitter {
    background: var(--line);
    cursor: col-resize;
    user-select: none;
    transition: background .12s;
    position: relative;
    z-index: 10;
  }
  .splitter:hover { background: var(--accent-dim); }
  .splitter.dragging { background: var(--accent); }
  body.is-resizing-cols { cursor: col-resize; user-select: none; }
  body.is-resizing-cols * { cursor: col-resize !important; }

  /* ===== 左:大纲树 ===== */
  .sidebar {
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 18px 14px;
    border-bottom: 1px solid var(--line);
  }
  .brand-mark {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px;
    letter-spacing: 1.4px;
    color: var(--fg-mute);
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .brand-dot {
    width: 10px; height: 10px; flex-shrink: 0;
    background:
      conic-gradient(from 210deg, var(--accent), #ec4899, #f59e0b, var(--accent));
    border-radius: 2px;
    transform: rotate(45deg);
  }
  .sidebar-header h1 {
    margin: 0 0 4px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .sidebar-header .sub {
    font-size: 11px;
    color: var(--fg-mute);
    letter-spacing: 0.3px;
  }
  .sidebar-search {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--fg);
    padding: 7px 10px;
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  .sidebar-search input:focus {
    border-color: var(--accent-dim);
  }
  .tree {
    flex: 1;
    overflow: auto;
    padding: 6px 0 40px;
  }
  .tree-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 8px 5px 0;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--fg-dim);
    border-left: 2px solid transparent;
    user-select: none;
    transition: background .1s;
  }
  .tree-item:hover {
    background: var(--bg-2);
    color: var(--fg);
  }
  .tree-item.active {
    background: linear-gradient(90deg, color-mix(in oklch, var(--accent) 18%, transparent), transparent);
    color: var(--fg);
    border-left-color: var(--accent);
  }
  .tree-item.has-img .dot {
    background: var(--accent);
  }
  .tree-item.dragging { opacity: 0.4; }
  .tree-item.drag-over {
    background: color-mix(in oklch, var(--accent) 28%, transparent);
    outline: 1px dashed var(--accent);
    outline-offset: -1px;
  }
  .tree-ops {
    margin-left: auto;
    display: none;
    gap: 2px;
    flex-shrink: 0;
  }
  .tree-item:hover .tree-ops { display: inline-flex; }
  .tree-ops button {
    width: 18px; height: 18px;
    padding: 0;
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--fg-dim);
    border-radius: 3px;
    font-size: 12px;
    line-height: 14px;
    cursor: pointer;
  }
  .tree-ops button:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .tree-ops .tree-op-del:hover {
    background: #d44;
    border-color: #d44;
  }
  .tree-item .chev {
    width: 14px;
    flex-shrink: 0;
    color: var(--fg-mute);
    text-align: center;
    font-size: 9px;
    transition: transform .15s;
  }
  .tree-item.collapsed .chev {
    transform: rotate(-90deg);
  }
  .tree-item .chev.empty { visibility: hidden; }
  .tree-item .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--line-2);
    flex-shrink: 0;
  }
  .tree-item .label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tree-children.hidden { display: none; }
  /* 跳转数徽章:按数量分三档,数量越多越醒目 */
  .tree-item .hit {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 1px 5px 1px 4px;
    border-radius: 3px;
    font-size: 10px;
    font-feature-settings: "tnum";
    font-weight: 600;
    line-height: 1.4;
    flex-shrink: 0;
    margin-left: 4px;
  }
  .tree-item .hit .hit-icon { font-size: 9px; line-height: 1; }
  .tree-item .hit .hit-num { line-height: 1; }
  /* 1-2 跳:低调 */
  .tree-item .hit.hot-low {
    color: var(--fg-mute);
    background: transparent;
    font-weight: 500;
  }
  /* 3-5 跳:蓝色中等强调 */
  .tree-item .hit.hot-mid {
    color: var(--accent);
    background: color-mix(in oklch, var(--accent) 14%, transparent);
  }
  /* ≥6 跳:橙色高亮 + 发光,提示"重点关注" */
  .tree-item .hit.hot-high {
    color: #fff;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    box-shadow: 0 0 0 1px color-mix(in oklch, #f59e0b 40%, transparent),
                0 0 8px color-mix(in oklch, #f59e0b 35%, transparent);
  }
  /* active 行里徽章更清晰 */
  .tree-item.active .hit.hot-mid {
    background: color-mix(in oklch, var(--accent) 28%, transparent);
  }

  /* ===== 中:舞台 + 手机框 ===== */
  .stage {
    background: 
      radial-gradient(ellipse at center, #1a1f27 0%, #0b0d10 80%);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .stage-toolbar {
    height: 44px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-1);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 12px;
    flex-shrink: 0;
    overflow: visible;
    z-index: 50;
    position: relative;
  }
  .crumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--fg-dim);
    flex: 1;
    overflow: hidden;
  }
  .crumb .sep { color: var(--fg-mute); font-size: 10px; }
  .crumb .cur { color: var(--fg); font-weight: 500; }
  .toolbar-btns {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }
  .tbtn {
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--fg-dim);
    padding: 5px 10px;
    font-size: 11px;
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: all .15s;
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tbtn:hover { color: var(--fg); border-color: var(--line-2); }
  .tbtn.active {
    background: color-mix(in oklch, var(--accent) 18%, var(--bg-2));
    border-color: var(--accent-dim);
    color: var(--fg);
  }
  .tbtn-sep {
    width: 1px;
    height: 18px;
    background: var(--line);
    margin: 0 4px;
    flex-shrink: 0;
  }
  /* 下拉菜单组 */
  .tbtn-group { position: relative; display: inline-flex; flex-shrink: 0; }
  .tbtn-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    z-index: 1000;
    list-style: none;
    margin: 0;
    padding: 4px;
    min-width: 200px;
    background: var(--bg-1);
    border: 1px solid var(--line-2);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    font-size: 12px;
  }
  .tbtn-menu[hidden] { display: none; }
  .tbtn-menu li {
    padding: 7px 10px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--fg-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .tbtn-menu li:hover { background: var(--bg-2); color: var(--fg); }
  .tbtn-menu li[role="menuitem"]:focus {
    background: var(--bg-2);
    color: var(--fg);
    outline: 2px solid #3b82f6;
    outline-offset: -2px;
  }
  .tbtn-menu li[role="menuitem"]:focus:not(:focus-visible) { outline: none; }
  .tbtn-menu li.sep {
    height: 1px;
    padding: 0;
    background: var(--line);
    margin: 4px 0;
    cursor: default;
  }
  .tbtn-menu li.sep:hover { background: var(--line); }
  .tbtn-menu li.disabled { opacity: 0.5; cursor: not-allowed; }
  .tbtn-menu li.disabled:hover { background: transparent; color: var(--fg-dim); }

  .stage-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    padding: 24px 16px;
    position: relative;
    min-width: 0;
  }

  /* iOS frame */
  .device {
    width: 330px;
    flex-shrink: 0;
    position: relative;
    transform: scale(var(--zoom, 1));
    transform-origin: top center;
    transition: transform .12s ease-out;
    margin-bottom: calc((var(--zoom, 1) - 1) * 714px);
  }
  .zoom-grp {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 1px;
    flex-shrink: 0;
  }
  .zoom-grp .zbtn {
    background: transparent;
    border: none;
    color: var(--fg-dim);
    width: 22px;
    height: 22px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 3px;
    line-height: 1;
    padding: 0;
  }
  .zoom-grp .zbtn:hover { color: var(--fg); background: var(--bg-3); }
  .zoom-grp .zlabel {
    min-width: 38px;
    text-align: center;
    font-size: 11px;
    color: var(--fg-dim);
    cursor: pointer;
    user-select: none;
  }
  .zoom-grp .zlabel:hover { color: var(--fg); }
  .device-frame {
    width: 330px;
    height: 714px;
    background: #000;
    border-radius: 42px;
    padding: 10px;
    box-shadow:
      0 0 0 2px #1d2026,
      0 0 0 4px #0a0b0d,
      0 30px 60px -10px rgba(0,0,0,0.6),
      0 20px 30px -15px rgba(0,0,0,0.4);
    position: relative;
  }
  .device-screen {
    width: 100%;
    height: 100%;
    border-radius: 32px;
    overflow: hidden;
    position: relative;
    background: #0b0d10;
  }
  .notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 28px;
    background: #000;
    border-radius: 16px;
    z-index: 10;
  }
  .statusbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 30px 0;
    z-index: 9;
    font-size: 15px;
    font-weight: 600;
    color: var(--fg);
    pointer-events: none;
  }
  .statusbar .icons { display: flex; gap: 5px; align-items: center; }
  .statusbar svg { display: block; }
  /* HTML 模拟的 iPhone 缺口 + 状态栏：默认隐藏，避免与截图自带状态栏重叠 */
  .device-screen .notch,
  .device-screen .statusbar { display: none; }
  .device-screen.show-chrome .notch { display: block; }
  .device-screen.show-chrome .statusbar { display: flex; }

  .screen-content {
    position: absolute;
    inset: 0;
    overflow: auto;
  }

  /* 占位符截图 */
  .screenshot-ph {
    width: 100%;
    min-height: 100%;
    background:
      repeating-linear-gradient(
        45deg,
        #161a20 0 10px,
        #1a1f26 10px 20px
      );
    display: flex;
    flex-direction: column;
    padding: 54px 20px 20px;
    position: relative;
  }
  .ph-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--fg);
    margin: 8px 0 10px;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
  }
  .ph-path {
    font-family: "SF Mono", "Menlo", Consolas, monospace;
    font-size: 9px;
    color: var(--fg-mute);
    letter-spacing: 0.3px;
    margin-bottom: 20px;
  }
  .ph-label {
    font-family: "SF Mono", "Menlo", Consolas, monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(0,0,0,0.4);
    padding: 3px 7px;
    border-radius: 3px;
    align-self: flex-start;
    letter-spacing: 0.5px;
  }
  .ph-filename {
    margin-top: auto;
    font-family: "SF Mono", "Menlo", Consolas, monospace;
    font-size: 9px;
    color: var(--fg-mute);
    opacity: 0.6;
    word-break: break-all;
    padding-top: 16px;
    border-top: 1px dashed rgba(255,255,255,0.05);
  }

  /* 热点 */
  .hotspot {
    position: absolute;
    background: color-mix(in oklch, var(--accent) 10%, transparent);
    border: 1px dashed var(--hotspot);
    border-radius: 6px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    z-index: 5;
    overflow: visible;
  }
  .hotspot-badge {
    position: absolute;
    top: -1px; left: -1px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    background: var(--accent);
    color: #0b0d10;
    font-size: 10px;
    font-weight: 700;
    border-radius: 3px 0 6px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-feature-settings: "tnum";
    pointer-events: none;
  }
  .hotspot-del {
    position: absolute;
    top: -1px; right: -1px;
    width: 18px; height: 18px;
    background: rgba(220, 60, 60, 0.92);
    color: white;
    font-size: 14px;
    font-weight: 700;
    line-height: 16px;
    text-align: center;
    border-radius: 0 3px 0 6px;
    cursor: pointer;
    display: none;
    z-index: 2;
  }
  .hotspot:hover .hotspot-del { display: block; }
  .device-screen.add-hotspot-mode {
    cursor: crosshair !important;
  }
  .device-screen.add-hotspot-mode .hotspot {
    pointer-events: none;
    opacity: 0.5;
  }
  .hotspot::after {
    content: attr(data-label);
    position: absolute;
    top: -22px;
    left: 0;
    background: var(--accent);
    color: #0b0d10;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transform: translateY(2px);
    transition: all .12s;
    pointer-events: none;
    font-family: inherit;
    z-index: 10;
  }
  .hotspot:hover {
    background: color-mix(in oklch, var(--accent) 25%, transparent);
    border-color: var(--accent);
    border-style: solid;
  }
  .hotspot:hover::after {
    opacity: 1;
    transform: translateY(0);
  }
  .hotspot.dragging {
    background: color-mix(in oklch, var(--warn) 30%, transparent);
    border: 2px solid var(--warn);
    cursor: grabbing;
  }
  /* 低置信度:橙色描边 + 警示标记 */
  .hotspot.low-conf {
    background: color-mix(in oklch, #f59e0b 14%, transparent);
    border: 1.5px dashed #f59e0b;
  }
  .hotspot.low-conf:hover {
    background: color-mix(in oklch, #f59e0b 28%, transparent);
    border-color: #f59e0b;
    border-style: solid;
  }
  .hotspot.low-conf .hotspot-badge {
    background: #f59e0b;
    color: #1a0f00;
  }
  .hotspot.low-conf .hotspot-badge::after {
    content: '!';
    margin-left: 3px;
    font-weight: 900;
  }
  .hotspot.low-conf::after {
    background: #f59e0b;
    color: #1a0f00;
  }
  /* 拖动时的对齐参考线(吸附到其他热点的边/中线) */
  .align-guide {
    position: absolute;
    background: #ec4899;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 0 0 0.5px rgba(236,72,153,.4), 0 0 6px rgba(236,72,153,.5);
  }
  .align-guide.vertical { width: 1px; }
  .align-guide.horizontal { height: 1px; }

  /* ===== 评论系统 ===== */
  /* 评论模式下给整张图加浅色边框提示 */
  .shot-wrap.comment-mode {
    cursor: crosshair;
    outline: 2px dashed color-mix(in oklch, var(--accent) 45%, transparent);
    outline-offset: -2px;
  }
  /* 评论模式下让热点让路 — 否则它们盖在图上会吃掉点击 */
  .shot-wrap.comment-mode .hotspot {
    pointer-events: none;
    opacity: 0.3;
  }
  /* 评论 pin */
  .comment-pin {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 22px; height: 22px;
    border-radius: 50% 50% 50% 0;
    background: #ef4444;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 2px 6px rgba(239,68,68,.4), 0 0 0 2px #0e1013;
    transition: transform .12s, box-shadow .12s;
    transform-origin: center;
    rotate: -45deg;
  }
  .comment-pin > * { rotate: 45deg; }
  .comment-pin:hover {
    transform: translate(-50%, -50%) scale(1.15);
    box-shadow: 0 4px 10px rgba(239,68,68,.6), 0 0 0 2px #0e1013;
  }
  .comment-pin.resolved {
    background: #64748b;
    box-shadow: 0 2px 4px rgba(0,0,0,.3), 0 0 0 2px #0e1013;
    opacity: 0.7;
  }
  .comment-pin.flash {
    animation: cmtFlash 1.2s ease-out;
  }
  @keyframes cmtFlash {
    0%, 100% { box-shadow: 0 2px 6px rgba(239,68,68,.4), 0 0 0 2px #0e1013; }
    50% { box-shadow: 0 0 0 6px rgba(239,68,68,.45), 0 0 0 2px #0e1013; }
  }

  /* 评论 popover */
  .comment-popover {
    position: absolute;
    transform: translate(-50%, 12px);
    min-width: 260px;
    max-width: 320px;
    background: var(--bg-1);
    border: 1px solid var(--line-2);
    border-radius: 8px;
    padding: 10px;
    z-index: 50;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  /* 浮动版本:固定在视口坐标,挂在 body,不被 iOS 框 clip */
  .comment-popover.floating {
    position: fixed;
    transform: none;
    z-index: 200;
    padding: 0;
    overflow: hidden;
  }
  .comment-popover.floating textarea,
  .comment-popover.floating .popover-btns,
  .comment-popover.floating .popover-meta {
    margin: 0;
  }
  .comment-popover.floating textarea { margin: 8px 10px 0; width: calc(100% - 20px); }
  .comment-popover.floating .popover-meta { padding: 0 10px; margin-top: 6px; }
  .comment-popover.floating .popover-btns { padding: 8px 10px 10px; margin-top: 6px; }
  .comment-popover.floating.dragging { opacity: 0.92; cursor: grabbing; }
  /* 拖动头 */
  .pop-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    cursor: grab;
    user-select: none;
  }
  .pop-head:active { cursor: grabbing; }
  .pop-title {
    font-size: 11px; font-weight: 600; color: var(--fg);
    letter-spacing: 0.3px;
  }
  .pop-drag-hint {
    font-size: 10px; color: var(--fg-mute);
    opacity: 0.7;
  }
  .comment-popover textarea {
    width: 100%;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 5px;
    color: var(--fg);
    padding: 7px 8px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
    line-height: 1.5;
  }
  .comment-popover textarea:focus { border-color: var(--accent-dim); }
  .popover-meta { font-size: 10px; color: var(--fg-mute); margin-top: 6px; }
  .popover-btns { display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px; }
  .pv-btn {
    background: var(--bg-3); border: 1px solid var(--line-2); color: var(--fg);
    padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit;
  }
  .pv-btn:hover { background: var(--line); }
  .pv-btn.ghost { background: transparent; color: var(--fg-dim); }
  .pv-btn.ghost:hover { color: var(--fg); background: var(--bg-3); }
  .pv-btn.primary {
    background: color-mix(in oklch, var(--accent) 30%, var(--bg-3));
    border-color: var(--accent-dim);
  }
  .pv-btn.primary:hover { background: color-mix(in oklch, var(--accent) 45%, var(--bg-3)); }

  /* 右侧评论列表 */
  .cmt-list { display: flex; flex-direction: column; gap: 6px; }
  .cmt-row {
    display: flex; gap: 8px; padding: 8px 10px;
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 6px; cursor: pointer;
    transition: background .1s;
  }
  .cmt-row:hover { background: var(--bg-3); }
  .cmt-row.resolved { opacity: 0.55; }
  .cmt-num {
    flex-shrink: 0; width: 18px; height: 18px;
    border-radius: 50%; background: #ef4444; color: #fff;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .cmt-row.resolved .cmt-num { background: #64748b; }
  .cmt-body { flex: 1; min-width: 0; }
  .cmt-text {
    font-size: 12px; color: var(--fg);
    line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .cmt-meta { font-size: 10px; color: var(--fg-mute); margin-top: 3px; }
  .cmt-page { font-size: 10px; color: var(--accent); margin-bottom: 2px; font-weight: 600; }

  /* 全局评论列表弹窗 */
  .cmt-list-panel {
    position: fixed;
    top: 60px; right: 20px;
    width: 380px; max-height: 70vh;
    background: var(--bg-1);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .cmt-panel-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-bottom: 1px solid var(--line);
  }
  .cmt-panel-title { font-size: 13px; font-weight: 600; flex: 1; }
  .cmt-panel-filter { display: flex; gap: 8px; font-size: 11px; color: var(--fg-dim); }
  .cmt-panel-filter label { cursor: pointer; }
  .cmt-panel-close {
    background: transparent; border: none; color: var(--fg-mute);
    cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 3px;
  }
  .cmt-panel-close:hover { background: var(--bg-2); color: var(--fg); }
  .cmt-panel-body { overflow-y: auto; padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .cmt-empty { padding: 30px; text-align: center; color: var(--fg-mute); font-size: 12px; }
  .cmt-row.global { padding: 10px 12px; }

  /* 树状图节点的红点(未解决评论) */
  .tree-item .cmt-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ef4444;
    flex-shrink: 0;
    margin-left: 4px;
    box-shadow: 0 0 0 1.5px var(--bg-1);
    animation: cmtPulse 2s ease-in-out infinite;
  }
  @keyframes cmtPulse {
    0%, 100% { box-shadow: 0 0 0 1.5px var(--bg-1), 0 0 0 0 rgba(239,68,68,.5); }
    50%      { box-shadow: 0 0 0 1.5px var(--bg-1), 0 0 0 3px rgba(239,68,68,0); }
  }

  /* 工具栏按钮右上角徽章 */
  .tbtn .badge {
    display: inline-block;
    margin-left: 3px;
    min-width: 14px; height: 14px;
    line-height: 14px;
    padding: 0 4px;
    background: #ef4444; color: #fff;
    border-radius: 7px;
    font-size: 9px; font-weight: 700;
    font-feature-settings: "tnum";
    vertical-align: 1px;
  }
  .tbtn .badge:empty { display: none; }

  /* ===== 导入/导出 Modal ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .15s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg-1);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    width: 480px; max-width: 92vw;
    max-height: 86vh;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    overflow: hidden;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    font-size: 14px; font-weight: 600;
  }
  .modal-close {
    background: transparent; border: none; color: var(--fg-mute);
    cursor: pointer; font-size: 15px; padding: 2px 8px; border-radius: 4px;
  }
  .modal-close:hover { background: var(--bg-2); color: var(--fg); }
  .modal-body {
    padding: 16px 18px;
    overflow-y: auto;
    flex: 1;
    display: flex; flex-direction: column; gap: 10px;
  }
  .modal-footer {
    display: flex; gap: 8px; justify-content: flex-end;
    padding: 12px 18px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }

  .export-summary {
    font-size: 12px; color: var(--fg-dim);
    padding: 10px 12px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .opt-row {
    display: flex; gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 6px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .opt-row:hover { background: var(--bg-2); }
  .opt-row input[type="radio"] { margin-top: 2px; flex-shrink: 0; accent-color: var(--accent); }
  .opt-row:has(input:checked) {
    border-color: var(--accent-dim);
    background: color-mix(in oklch, var(--accent) 8%, var(--bg));
  }
  .opt-row.compact { padding: 9px 12px; }
  .opt-title { font-size: 12.5px; font-weight: 600; color: var(--fg); margin-bottom: 3px; }
  .opt-desc { font-size: 11px; color: var(--fg-dim); line-height: 1.55; }
  .opt-desc.small { font-size: 10.5px; line-height: 1.45; }
  .opt-desc b { color: var(--fg); }
  .opt-group-title {
    font-size: 10px; color: var(--fg-mute);
    letter-spacing: 1.2px; text-transform: uppercase;
    margin-top: 6px; margin-bottom: 2px;
  }

  .import-drop {
    border: 2px dashed var(--line-2);
    border-radius: 8px;
    padding: 22px;
    text-align: center;
    cursor: pointer;
    transition: all .12s;
  }
  .import-drop:hover { border-color: var(--accent-dim); background: var(--bg-2); }
  .import-drop.drag-over { border-color: var(--accent); background: color-mix(in oklch, var(--accent) 10%, var(--bg)); }
  .drop-icon { font-size: 26px; margin-bottom: 6px; }
  .drop-hint { font-size: 12px; color: var(--fg-dim); }
  .drop-filename { font-size: 11px; color: var(--fg-mute); margin-top: 6px; font-family: ui-monospace, monospace; }

  .import-preview:empty { display: none; }
  .preview-ok {
    font-size: 11px; color: #22c55e;
    padding: 8px 10px;
    background: color-mix(in oklch, #22c55e 10%, var(--bg));
    border: 1px solid color-mix(in oklch, #22c55e 30%, var(--line));
    border-radius: 5px;
    margin-bottom: 6px;
  }
  .preview-err {
    font-size: 11px; color: #ef4444;
    padding: 8px 10px;
    background: color-mix(in oklch, #ef4444 10%, var(--bg));
    border: 1px solid color-mix(in oklch, #ef4444 30%, var(--line));
    border-radius: 5px;
  }
  .preview-stats { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--fg-dim); padding: 0 4px; }
  .preview-stats b { color: var(--fg); font-feature-settings: "tnum"; margin-right: 2px; }
  .preview-stats .muted { color: var(--fg-mute); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translate(-50%, 20px);
    background: var(--bg-1);
    border: 1px solid var(--line-2);
    color: var(--fg);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 12px;
    z-index: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  /* 右下角尺寸手柄(按住 Shift 拖这个角调整大小) */
  .hotspot::before {
    content: '';
    position: absolute;
    right: 0; bottom: 0;
    width: 10px; height: 10px;
    background:
      linear-gradient(135deg, transparent 50%, var(--accent-dim) 50%);
    opacity: 0.6;
    pointer-events: none;
    border-bottom-right-radius: 5px;
  }
  .stage.hotspots-hidden .hotspot {
    opacity: 0;
    pointer-events: none;
  }

  /* 使用提示 */
  .stage-hint {
    position: absolute;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10.5px;
    color: var(--fg-mute);
    background: rgba(0,0,0,0.4);
    padding: 4px 10px;
    border-radius: 10px;
    letter-spacing: 0.3px;
    pointer-events: none;
    white-space: nowrap;
    z-index: 3;
  }
  .stage-hint kbd {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 9.5px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    padding: 1px 4px;
    border-radius: 3px;
    color: var(--fg-dim);
  }

  /* ===== 右:备注面板 ===== */
  .inspector {
    background: var(--bg-1);
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .ins-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--line);
  }
  .ins-kicker {
    font-size: 10px;
    color: var(--fg-mute);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .ins-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--fg);
  }
  .ins-body {
    flex: 1;
    overflow: auto;
    padding: 16px 18px;
  }
  .ins-section {
    margin-bottom: 20px;
  }
  /* 截图操作区 */
  .ins-section.img-actions {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .img-status {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-left: auto;
  }
  .img-status.orig { background: color-mix(in oklch, var(--accent) 14%, transparent); color: var(--accent); }
  .img-status.ovr  { background: color-mix(in oklch, #10b981 16%, transparent); color: #34d399; }
  .img-status.none { background: var(--bg-3); color: var(--fg-mute); }
  .img-actions .ins-label { display: flex; align-items: center; }
  .img-btns { display: flex; gap: 6px; margin-top: 8px; }
  .img-btn {
    flex: 1;
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    color: var(--fg);
    padding: 7px 10px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    font-family: inherit;
  }
  .img-btn:hover { background: var(--line); border-color: var(--accent-dim); }
  .img-btn.primary {
    background: color-mix(in oklch, var(--accent) 18%, var(--bg-3));
    border-color: var(--accent-dim);
    color: var(--fg);
  }
  .img-btn.primary:hover {
    background: color-mix(in oklch, var(--accent) 30%, var(--bg-3));
  }
  .ins-label {
    font-size: 10px;
    color: var(--fg-mute);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ins-label .tag {
    background: color-mix(in oklch, var(--warn) 15%, transparent);
    color: var(--warn);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 9px;
    letter-spacing: 0.5px;
    text-transform: none;
    font-weight: 600;
  }
  .ins-note {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-left: 2px solid var(--warn);
    padding: 10px 12px;
    border-radius: 0 6px 6px 0;
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--fg);
    white-space: pre-wrap;
  }
  .ins-meta {
    font-size: 11px;
    color: var(--fg-dim);
    line-height: 1.7;
  }
  .ins-meta .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px dashed var(--line);
  }
  .ins-meta .row:last-child { border: 0; }
  .ins-meta .k { color: var(--fg-mute); }
  .ins-meta .v {
    font-family: "SF Mono", "Menlo", Consolas, monospace;
    font-size: 10.5px;
    color: var(--fg-dim);
  }

  /* 子页面导航 */
  .children-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .child-link {
    background: var(--bg-2);
    border: 1px solid var(--line);
    padding: 8px 10px;
    border-radius: 5px;
    font-size: 12px;
    color: var(--fg-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .12s;
  }
  .child-link:hover {
    border-color: var(--accent-dim);
    color: var(--fg);
    background: color-mix(in oklch, var(--accent) 10%, var(--bg-2));
  }
  .child-link .arr { color: var(--fg-mute); margin-left: auto; }
  .child-link:hover .arr { color: var(--accent); }
  .child-link .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--line-2);
    flex-shrink: 0;
  }
  .child-link.has-img .dot { background: var(--accent); }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--line-2);
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: #454e5c; background-clip: padding-box; border: 2px solid transparent; }

  /* 空态 */
  .empty-note {
    font-size: 11px;
    color: var(--fg-mute);
    font-style: italic;
    padding: 8px 12px;
    background: var(--bg-2);
    border-radius: 5px;
    border: 1px dashed var(--line);
  }
</style>
</head>
<body>

<div class="app">

  <!-- 左侧大纲 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-mark"><span class="brand-dot"></span>MindDeck</div>
      <h1>移动端个人理财 · 产品评审</h1>
      <div class="sub">191 节点 · 133 截图 · 27 项要求</div>
    </div>
    <div class="sidebar-search">
      <input id="search" placeholder="搜索节点..." type="text">
    </div>
    <div class="tree" id="tree"></div>
  </aside>

  <!-- 拖拽分隔条（左栏 ↔ 中间） -->
  <div class="splitter" data-splitter="left" title="拖动调整左栏宽度（双击重置）"></div>

  <!-- 中间舞台 -->
  <main class="stage" id="stage">
    <div class="stage-toolbar">
      <div class="crumb" id="crumb"></div>
      <div class="toolbar-btns">
        <!-- 缩放（演示/投屏场景） -->
        <div class="zoom-grp" title="缩放截图（Cmd/Ctrl + +/-/0；Ctrl 滚轮）">
          <button class="zbtn" id="btn-zoom-out">−</button>
          <span class="zlabel" id="zoom-label" title="点击重置">100%</span>
          <button class="zbtn" id="btn-zoom-in">+</button>
        </div>

        <span class="tbtn-sep"></span>

        <!-- AI 组 -->
        <div class="tbtn-group">
          <button class="tbtn" id="btn-ai-menu" title="AI 识别热点" aria-haspopup="menu" aria-expanded="false" aria-controls="dd-ai">🔍 AI ▾</button>
          <ul class="tbtn-menu" id="dd-ai" role="menu" aria-labelledby="btn-ai-menu" hidden>
            <li data-act="ai-current">🎯 识别当前页热点</li>
            <li data-act="ai-batch">📦 批量识别所有父页</li>
          </ul>
        </div>

        <span class="tbtn-sep"></span>

        <!-- 评论 -->
        <button class="tbtn" id="btn-comment-mode" title="C · 进入评论模式">💬 评论</button>
        <button class="tbtn" id="btn-comment-list" title="所有未解决评论">🔔<span id="comment-badge" class="badge"></span></button>

        <span class="tbtn-sep"></span>

        <!-- 热点组 -->
        <div class="tbtn-group">
          <button class="tbtn" id="btn-hotspot-menu" title="热点操作" aria-haspopup="menu" aria-expanded="false" aria-controls="dd-hotspot">⊞ 热点 ▾</button>
          <ul class="tbtn-menu" id="dd-hotspot" role="menu" aria-labelledby="btn-hotspot-menu" hidden>
            <li data-act="hs-toggle">👁 显示 / 隐藏热点 (H)</li>
            <li data-act="hs-add">➕ 拖框新增热点</li>
          </ul>
        </div>

        <span class="tbtn-sep"></span>

        <!-- 数据组（含纪要） -->
        <div class="tbtn-group">
          <button class="tbtn" id="btn-data-menu" title="数据 · 纪要" aria-haspopup="menu" aria-expanded="false" aria-controls="dd-data">📁 数据 ▾</button>
          <ul class="tbtn-menu" id="dd-data" role="menu" aria-labelledby="btn-data-menu" hidden>
            <li data-act="export-json">📤 导出原型数据 (JSON)</li>
            <li data-act="import-json">📥 导入原型数据 (JSON)</li>
            <li class="sep"></li>
            <li data-act="export-review-html">📋 导出评审纪要 (HTML)</li>
            <li data-act="export-review-docx">📄 导出评审纪要 (Word)</li>
            <li data-act="import-review">📝 导入会议纪要…</li>
          </ul>
        </div>

        <span class="tbtn-sep"></span>

        <!-- 导航 -->
        <button class="tbtn" id="btn-parent" title="↑ 父级">↑</button>
        <button class="tbtn" id="btn-prev" title="← 上一页">‹</button>
        <button class="tbtn" id="btn-next" title="→ 下一页">›</button>
      </div>
    </div>
    <div class="stage-body">
      <div class="stage-hint">按住 <kbd>Shift</kbd> 拖动热点可重新定位 · 右下角可调尺寸</div>
      <div class="device">
        <div class="device-frame">
          <div class="device-screen">
            <div class="notch"></div>
            <div class="statusbar">
              <span>9:41</span>
              <div class="icons">
                <!-- signal -->
                <svg width="17" height="11" viewBox="0 0 17 11"><g fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="6" rx="0.5"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></g></svg>
                <!-- wifi -->
                <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 1C4.5 1 1.9 2.1 0 3.8l1.3 1.3C2.9 3.7 5.1 2.8 7.5 2.8s4.6.9 6.2 2.3L15 3.8C13.1 2.1 10.5 1 7.5 1zm0 3.1c-2.1 0-4 .8-5.4 2L3.4 7.5c1.1-.9 2.5-1.5 4.1-1.5s3 .6 4.1 1.5l1.3-1.4c-1.4-1.2-3.3-2-5.4-2zm0 3.1c-1.2 0-2.2.4-3 1.2L7.5 10l3-1.6c-.8-.8-1.8-1.2-3-1.2z"/></svg>
